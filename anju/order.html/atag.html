<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Order</title>
    <link rel="stylesheet" href="styles.css">
<style>/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    background: url('images/background.jpg') no-repeat center center/cover;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(255, 255, 255, 0.9);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    width: 400px;
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
}

h1, h2 {
    color: #333;
}

.main-menu {
    margin: 20px 0;
}

.main-item {
    background: #ff7043;
    color: white;
    padding: 12px;
    margin: 10px 0;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
    transition: all 0.3s ease;
}

.main-item:hover {
    background: #ff5722;
}

.sub-menu {
    display: none;
    background: #f8f9fa;
    padding: 10px;
    border-radius: 5px;
}

.sub-menu label {
    display: block;
    padding: 5px;
    cursor: pointer;
}

.order-btn {
    background: #28a745;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.order-btn:hover {
    background: #218838;
}

.payment-options img {
    width: 80px;
    margin: 10px;
    transition: transform 0.3s;
}

.payment-options img:hover {
    transform: scale(1.1);
}</style>
</head>
<body bg="C:\Users\yelur\OneDrive\Pictures\New folder (2)\order.jpg">

    <div class="container">
        <h1>Order Your Food</h1>

        <div class="main-menu">
            <div class="main-item" onclick="toggleSubmenu('pizza')">Pizza 🍕</div>
            <div class="sub-menu" id="pizza">
                <label><input type="checkbox"> Margherita</label>
                <label><input type="checkbox"> Peppy Paneer</label>
                <label><input type="checkbox"> BBQ Chicken</label>
            </div>

            <div class="main-item" onclick="toggleSubmenu('burger')">Burger 🍔</div>
            <div class="sub-menu" id="burger">
                <label><input type="checkbox"> Cheese Burger</label>
                <label><input type="checkbox"> Veg Burger</label>
                <label><input type="checkbox"> Chicken Burger</label>
            </div>

            <div class="main-item" onclick="toggleSubmenu('biryani')">Biryani 🍛</div>
            <div class="sub-menu" id="biryani">
                <label><input type="checkbox"> Veg Biryani</label>
                <label><input type="checkbox"> Chicken Biryani</label>
                <label><input type="checkbox"> Mutton Biryani</label>
            </div>
        </div>

        <button class="order-btn">Place Order</button>

        <h2>Choose Payment Method</h2>
        <div class="payment-options">
            <img src="images/phonepe.png" alt="PhonePe">
            <img src="images/gpay.png" alt="Google Pay">
            <img src="images/vasa.png" alt="Vasa">
        </div>
    </div>

    <script>
        function toggleSubmenu(id) {
            var submenu = document.getElementById(id);
            submenu.style.display = submenu.style.display === "block" ? "none" : "block";
        }
    </script>

</body>
</html>
